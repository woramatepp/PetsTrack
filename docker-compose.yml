services:
  postgres:
    image: postgres:17
    container_name: postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "${DB_PORT}:5432"
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      - postgres
    restart: unless-stopped

  api-gateway:
    build: 
      context: ./api-gateway 
    container_name: api-gateway
    ports:
      - "${GATEWAY_PORT}:${GATEWAY_PORT}"
    env_file:
      - .env
    environment:
      - PORT=${GATEWAY_PORT}
      - SECRET=${SECRET}
      - AUTH_SERVICE_URL=http://auth-service:${AUTH_PORT}
      - PET_SERVICE_URL=http://pet-management:${PET_PORT}
      - TRACKING_SERVICE_URL=http://tracking-service:8081
    depends_on:
      - auth-service
      - pet-management
      - tracking-service
      - jaeger
    restart: unless-stopped

  auth-service:
    build: 
      context: ./auth 
    container_name: auth-service
    ports:
      - "${AUTH_PORT}:${AUTH_PORT}"
    env_file:
      - .env
    environment:
      - PORT=${AUTH_PORT}
      - DB_DSN=${AUTH_DB_DSN}
      - SECRET=${SECRET}
    depends_on:
      - postgres
      - jaeger
    restart: unless-stopped

  pet-management:
    build: 
      context: ./pet-management 
    container_name: pet-management
    ports:
      - "${PET_PORT}:${PET_PORT}"
    env_file:
      - .env
    environment:
      - PORT=${PET_PORT}
      - DB_DSN=${PET_DB_DSN}
      - SECRET=${SECRET}
    depends_on:
      - postgres
      - jaeger
    restart: unless-stopped

  tracking-service:
    build: 
      context: ./tracking-service 
    container_name: tracking-service
    ports:
      - "8081:8081"
    environment:
      - PORT=8081
      - RABBIT_URL=amqp://guest:guest@rabbitmq:5672/
      # อ้างอิง DB_USER และ DB_PASSWORD จากไฟล์ .env ของโปรเจกต์หลัก และต่อเข้า tracking_db
      - DB_DSN=host=postgres port=5432 user=${DB_USER} password=${DB_PASSWORD} dbname=tracking_db sslmode=disable
    depends_on:
      - postgres
      - jaeger
    restart: unless-stopped

  ngrok:
    image: ngrok/ngrok:latest
    container_name: ngrok
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    # สั่งให้ ngrok ชี้ไปที่คอนเทนเนอร์ tracking-service พอร์ต 8081 ในเครือข่ายเดียวกัน
    command: "http tracking-service:8081 --log stdout"
    depends_on:
      - tracking-service
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672" 
      - "15672:15672" # UI mq

  jaeger:
    image: jaegertracing/all-in-one:latest
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"     # Web UI
      - "4318:4318"       # OTLP Receiver

  notification-service:
    build: 
      context: ./notification-service
    container_name: notification-service
    environment:
      - RABBIT_URL=amqp://guest:guest@rabbitmq:5672/
    ports:
      - "8080:8080"
    depends_on:
      - rabbitmq
      - jaeger
    restart: unless-stopped
    

volumes:
  postgres_data: